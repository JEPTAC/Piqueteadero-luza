<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Luza POS">
  <link rel="apple-touch-icon" href="assets/logo.jpg">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>Piqueteadero Luza POS | Firebase PWA</title>
</head>
<body>
  <div id="boot" class="boot">
    <img src="assets/logo.jpg" alt="Piqueteadero Luza">
    <strong>Piqueteadero Luza POS</strong>
    <span>Cargando sistema operativo...</span>
  </div>

  <div id="login" class="login hidden"></div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/logo.jpg" alt="Logo">
        <div>
          <strong>Piqueteadero Luza</strong>
          <span>POS Firebase PWA</span>
        </div>
      </div>
      <div class="user-card">
        <label>Usuario activo</label>
        <strong id="userName">Demo</strong>
        <span id="userRole">Gerente</span>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="side-actions">
        <button id="enableSoundBtn" class="btn yellow block">Activar sonido fuerte</button>
        <button id="installBtn" class="btn white block hidden">Instalar app</button>
        <button id="logoutBtn" class="btn ghost block">Cerrar sesión</button>
      </div>
    </aside>

    <header class="mobile-top">
      <div class="mobile-brand">
        <img src="assets/logo.jpg" alt="Logo">
        <div>
          <strong>Piqueteadero Luza</strong>
          <span id="mobileRole">Gerente</span>
        </div>
      </div>
      <button id="mobileSoundBtn" class="btn yellow small">🔊</button>
    </header>

    <main class="main">
      <section class="topbar">
        <div>
          <h1 id="pageTitle">Panel</h1>
          <p id="pageSub">Control operativo en tiempo real.</p>
        </div>
        <div class="top-actions">
          <span id="connectionPill" class="pill"><span class="dot"></span> Demo local</span>
          <button id="refreshBtn" class="btn white">Sincronizar</button>
        </div>
      </section>
      <section id="view"></section>
    </main>

    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <div id="modalBg" class="modal-bg"><div id="modal" class="modal"></div></div>
  <div id="toastStack" class="toast-stack"></div>
  <div id="alarm" class="alarm hidden">
    <div class="alarm-card">
      <div class="alarm-icon">🔔</div>
      <strong id="alarmTitle">Notificación</strong>
      <p id="alarmText">Mensaje</p>
      <button class="btn yellow" onclick="window.__closeAlarm()">Entendido</button>
    </div>
  </div>

  <audio id="urgentSound" src="assets/sounds/urgent.wav" preload="auto"></audio>
  <audio id="readySound" src="assets/sounds/ready.wav" preload="auto"></audio>
  <audio id="softSound" src="assets/sounds/soft.wav" preload="auto"></audio>

  <script type="module" src="app.js"></script>
</body>
</html>
